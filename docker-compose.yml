services:
  redis:
    image: redis:7-alpine
    container_name: buildai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: buildai-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=dpg-d934mbe7r5hc73a53vc0-a.ohio-postgres.render.com
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=live_event_broadcasting_system
      - DB_POSTGRESDB_USER=live_event_broadcasting_system_user
      - DB_POSTGRESDB_PASSWORD=hzXc8AtR4HQigVNQ8Nu6UjpjWezJ8e06
      - DB_POSTGRESDB_SSL=true
      - DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED=false
    depends_on:
      redis:
        condition: service_healthy
